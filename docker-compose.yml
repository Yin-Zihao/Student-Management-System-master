version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: sms-nginx
    ports:
      - "8091:8091"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./code/frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - sms-network
    restart: unless-stopped

  backend:
    image: openjdk:17-jdk-slim
    container_name: sms-backend
    expose:
      - "8080"
    volumes:
      - ./code/backend/target/sms-backend.jar:/app/sms-backend.jar
    working_dir: /app
    command: java -jar sms-backend.jar --server.port=8080
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/student_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
    depends_on:
      - mysql
    networks:
      - sms-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: sms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: student_management
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./code/backend/数据库生成代码:/docker-entrypoint-initdb.d
    networks:
      - sms-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  sms-network:
    driver: bridge
