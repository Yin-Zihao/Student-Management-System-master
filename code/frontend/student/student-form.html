<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>学生管理 - 新增/编辑学生</title>
    <link rel="stylesheet" href="../assets/style.css">
  </head>
  <body>
    <header class="topbar">
      <h2>学生管理系统</h2>
      <nav>
        <a href="dashboard.html">仪表盘</a>
        <a href="students.html">学生列表</a>
        <a href="../login/login.html">退出</a>
      </nav>
    </header>
    <main class="container">
      <section class="card" style="grid-column:1/3">
        <h3 id="formTitle">新增学生</h3>
        <form id="studentForm">
          <label>姓名<input name="name" required></label>
          <label>性别
            <select name="gender"><option>男</option><option>女</option></select>
          </label>
          <label>班级<input name="class"></label>
          <label>联系电话<input name="phone"></label>
          <div class="actions">
            <button type="submit">保存</button>
            <a href="students.html" style="margin-left:8px;color:#666;text-decoration:none">取消</a>
          </div>
        </form>
      </section>
    </main>
    <script src="../assets/app.js"></script>
  </body>
</html>
